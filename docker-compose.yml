version: "3.8"

services:
  app:
    build: .
    ports:
      - "8080:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-32-byte-key-here!!!!}
    volumes:
      - app_data:/app/server/data
    restart: unless-stopped

volumes:
  app_data:
